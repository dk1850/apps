<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kabus Garage - Timeline Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Permanent+Marker&family=Rock+Salt&display=swap');
        
        .rock-font { font-family: 'Oswald', sans-serif; tracking: 0.05em; }
        .marker-font { font-family: 'Permanent Marker', cursive; }
        
        /* Custom Scrollbar für die Web-Vorschau */
        .custom-scroll::-webkit-scrollbar { height: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: #1e293b; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #ea580c; border-radius: 4px; }
        
        /* Druck- und Slalom-Stile */
        .slalom-line {
            position: absolute;
            border: 4px dashed #ea580c;
            z-index: 0;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen selection:bg-orange-600 selection:text-white">

    <div class="max-w-7xl mx-auto p-4 md:p-6 space-y-6">
        
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-slate-900 p-5 rounded-2xl border-2 border-orange-600/30 shadow-2xl shadow-orange-950/20">
            <div>
                <h1 class="text-3xl font-black text-orange-500 flex items-center gap-3 rock-font uppercase italic tracking-wider">
                    <i data-lucide="wrench" class="text-orange-500 animate-pulse"></i> BIKER GARAGE <span class="text-slate-400 font-light text-xl">// Timeline</span>
                </h1>
                <p class="text-xs text-slate-400 uppercase tracking-widest mt-1">Rock 'n' Roll Service & Leasing Planer</p>
            </div>
            <div class="flex gap-3 w-full sm:w-auto">
                <button onclick="openModal('vehicleModal')" class="flex-1 sm:flex-none bg-orange-600 hover:bg-orange-500 text-white px-5 py-2.5 rounded-xl font-bold text-sm flex items-center justify-center gap-2 transition uppercase rock-font tracking-wide shadow-lg shadow-orange-900/40">
                    <i data-lucide="plus-circle" class="w-4 h-4"></i> Bike/KFZ einreiten
                </button>
                <button onclick="exportSlalomPDF()" class="flex-1 sm:flex-none bg-slate-800 hover:bg-slate-700 text-orange-500 border border-orange-500/50 px-5 py-2.5 rounded-xl font-bold text-sm flex items-center justify-center gap-2 transition uppercase rock-font tracking-wide">
                    <i data-lucide="download" class="w-4 h-4"></i> PDF Heavy Load
                </button>
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            
            <div class="space-y-6">
                <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-xl">
                    <label class="block text-xs font-bold text-orange-500 uppercase tracking-widest mb-2 rock-font">Aktuelle Maschine</label>
                    <select id="vehicleSelect" onchange="switchVehicle(this.value)" class="w-full bg-slate-950 border border-slate-800 text-orange-400 rounded-xl p-3 text-sm font-bold focus:ring-2 focus:ring-orange-500 focus:outline-none">
                        </select>
                    
                    <div id="vehicleImageContainer" class="mt-4 hidden relative group rounded-xl overflow-hidden border-2 border-slate-800">
                        <img id="vehicleProfileImg" src="" alt="Fahrzeugbild" class="w-full h-44 object-cover filter grayscale contrast-125 group-hover:grayscale-0 transition duration-500">
                        <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-transparent to-transparent opacity-80"></div>
                    </div>
                </div>

                <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 shadow-xl space-y-4">
                    <h3 class="text-xs font-bold text-orange-500 uppercase tracking-widest rock-font">Deadlines & Termine</h3>
                    <div id="countdownContainer" class="space-y-3">
                        </div>
                </div>

                <button onclick="openModal('eventModal')" id="addEventBtn" class="w-full bg-slate-100 hover:bg-white text-slate-950 p-4 rounded-2xl font-bold text-sm flex items-center justify-center gap-2 transition shadow-xl uppercase rock-font tracking-wider disabled:opacity-30 disabled:hover:bg-slate-100" disabled>
                    <i data-lucide="calendar-plus" class="w-5 h-5 text-orange-600"></i> Event in Schrauberbuch eintragen
                </button>
            </div>

            <div class="lg:col-span-3 space-y-6">
                <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800 flex flex-wrap gap-4 items-center justify-between shadow-xl">
                    <div class="flex items-center gap-3">
                        <i data-lucide="filter" class="w-4 h-4 text-orange-500"></i>
                        <span class="text-xs font-bold text-slate-400 uppercase tracking-wider rock-font">Filter:</span>
                        <select id="typeFilter" onchange="renderEverything()" class="bg-slate-950 border border-slate-800 text-slate-300 rounded-lg p-2 text-xs font-bold focus:outline-none focus:ring-1 focus:ring-orange-500">
                            <option value="all">Volles Programm (Alle)</option>
                            <option value="Wartung">Service / Inspektion</option>
                            <option value="TÜV">TÜV / Plakette</option>
                            <option value="Reparatur">Schrauberei / Reparatur</option>
                            <option value="Sonstiges">Papierkram / Sonstiges</option>
                        </select>
                    </div>
                    <div class="text-[10px] text-slate-500 uppercase tracking-wider font-mono">
                        Status: Bereit zum Heizen
                    </div>
                </div>

                <div id="pdfRenderArea" class="bg-slate-900 p-8 rounded-2xl border-2 border-slate-800 shadow-2xl relative overflow-hidden">
                    
                    <div class="absolute inset-0 bg-[radial-gradient(#1e293b_1px,transparent_1px)] [background-size:16px_16px] opacity-20 pointer-events-none"></div>

                    <div class="flex items-center gap-5 mb-8 border-b-2 border-slate-800 pb-5 relative z-10">
                        <div id="timelineVehicleBadge" class="w-16 h-16 rounded-2xl bg-slate-950 border-2 border-orange-500 overflow-hidden flex items-center justify-center text-orange-500 font-black text-xl rock-font shadow-inner">
                        </div>
                        <div>
                            <h2 id="timelineVehicleName" class="text-2xl font-black text-white uppercase rock-font tracking-wide">Kein Ofen bereit</h2>
                            <p id="timelineVehicleSub" class="text-xs text-orange-500/80 font-mono mt-0.5"></p>
                        </div>
                    </div>

                    <div class="relative px-4">
                        <div id="slalomTimelineContainer" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8 relative z-10">
                            </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <div id="vehicleModal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md hidden items-center justify-center z-50 p-4">
        <div class="bg-slate-900 rounded-2xl max-w-md w-full p-6 border-2 border-orange-600 shadow-2xl">
            <div class="flex justify-between items-center mb-4 border-b border-slate-800 pb-2">
                <h3 class="text-xl font-bold text-orange-500 uppercase rock-font">Maschine registrieren</h3>
                <button onclick="closeModal('vehicleModal')" class="text-slate-400 hover:text-white"><i data-lucide="x"></i></button>
            </div>
            <form id="vehicleForm" class="space-y-4" onsubmit="saveVehicle(event)">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Name / Bezeichnung</label>
                    <input type="text" id="vName" required placeholder="z.B. Harley Bobber, Kangoo Beast" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm text-slate-200 focus:ring-2 focus:ring-orange-500 focus:outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Leasing Start</label>
                        <input type="date" id="vStart" required class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm text-slate-200 focus:ring-2 focus:ring-orange-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Leasing Ende</label>
                        <input type="date" id="vEnde" required class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm text-slate-200 focus:ring-2 focus:ring-orange-500 focus:outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Foto der Maschine</label>
                    <input type="file" id="vImage" accept="image/*" class="w-full text-xs text-slate-400 file:mr-4 file:py-2.5 file:px-4 file:rounded-xl file:border-0 file:text-xs file:font-bold file:bg-orange-600 file:text-white hover:file:bg-orange-500 file:transition cursor-pointer">
                </div>
                <button type="submit" class="w-full bg-orange-600 hover:bg-orange-500 text-white p-3 rounded-xl font-bold uppercase tracking-wider transition rock-font mt-2">In die Garage stellen</button>
            </form>
        </div>
    </div>

    <div id="eventModal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md hidden items-center justify-center z-50 p-4">
        <div class="bg-slate-900 rounded-2xl max-w-md w-full p-6 border-2 border-orange-600 shadow-2xl">
            <div class="flex justify-between items-center mb-4 border-b border-slate-800 pb-2">
                <h3 class="text-xl font-bold text-orange-500 uppercase rock-font">Eintrag ins Schrauberbuch</h3>
                <button onclick="closeModal('eventModal')" class="text-slate-400 hover:text-white"><i data-lucide="x"></i></button>
            </div>
            <form id="eventForm" class="space-y-4" onsubmit="saveEvent(event)">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Datum</label>
                        <input type="date" id="eDate" required class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm text-slate-200 focus:ring-2 focus:ring-orange-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Kategorie</label>
                        <select id="eType" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm text-orange-400 font-bold focus:ring-2 focus:ring-orange-500 focus:outline-none">
                            <option value="Wartung">Service / Inspektion</option>
                            <option value="TÜV">TÜV / Plakette</option>
                            <option value="Reparatur">Schrauberei / Reparatur</option>
                            <option value="Sonstiges">Papierkram / Sonstiges</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Was wurde gemacht?</label>
                    <input type="text" id="eTitle" required placeholder="z.B. Ölwechsel, Kette gespannt, TÜV neu" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm text-slate-200 focus:ring-2 focus:ring-orange-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Zusatzinfos / Werkstatt / Kosten</label>
                    <input type="text" id="eNote" placeholder="z.B. 240€ bei Custom-Bikes Hildesheim" class="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm text-slate-200 focus:ring-2 focus:ring-orange-500 focus:outline-none">
                </div>
                <button type="submit" class="w-full bg-orange-600 hover:bg-orange-500 text-white p-3 rounded-xl font-bold uppercase tracking-wider transition rock-font mt-2">Ereignis festmeißeln</button>
            </form>
        </div>
    </div>

    <script>
        let data = { vehicles: [] };
        let activeVehicleId = null;

        const typeIcons = {
            'Start': 'flag', 'Ende': 'key', 'Wartung': 'wrench',
            'TÜV': 'shield-check', 'Reparatur': 'hammer', 'Sonstiges': 'file-text'
        };

        const typeColors = {
            'Start': 'border-emerald-500 text-emerald-500 bg-emerald-950/50',
            'Ende': 'border-rose-600 text-rose-500 bg-rose-950/50',
            'Wartung': 'border-blue-500 text-blue-400 bg-blue-950/50',
            'TÜV': 'border-purple-500 text-purple-400 bg-purple-950/50',
            'Reparatur': 'border-orange-500 text-orange-400 bg-orange-950/50',
            'Sonstiges': 'border-slate-500 text-slate-400 bg-slate-800/50'
        };

        window.onload = function() {
            loadFromStorage();
            lucide.createIcons();
        };

        function loadFromStorage() {
            const localData = localStorage.getItem('kfz_biker_data');
            if (localData) {
                data = JSON.parse(localData);
                populateVehicleSelect();
                if (data.vehicles.length > 0) {
                    switchVehicle(data.vehicles[0].id);
                }
            }
            renderEverything();
        }

        function saveToStorage() {
            localStorage.setItem('kfz_biker_data', JSON.stringify(data));
            renderEverything();
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); document.getElementById(id).classList.add('flex'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); document.getElementById(id).classList.remove('flex'); }

        function saveVehicle(e) {
            e.preventDefault();
            const name = document.getElementById('vName').value;
            const start = document.getElementById('vStart').value;
            const ende = document.getElementById('vEnde').value;
            const imgFile = document.getElementById('vImage').files[0];

            const newVehicle = {
                id: 'v_' + Date.now(),
                name: name,
                leasingStart: start,
                leasingEnde: ende,
                image: '',
                events: []
            };

            if (imgFile) {
                const reader = new FileReader();
                reader.onloadend = function() {
                    newVehicle.image = reader.result;
                    data.vehicles.push(newVehicle);
                    activeVehicleId = newVehicle.id;
                    saveToStorage();
                    populateVehicleSelect();
                    closeModal('vehicleModal');
                    document.getElementById('vehicleForm').reset();
                }
                reader.readAsDataURL(imgFile);
            } else {
                data.vehicles.push(newVehicle);
                activeVehicleId = newVehicle.id;
                saveToStorage();
                populateVehicleSelect();
                closeModal('vehicleModal');
                document.getElementById('vehicleForm').reset();
            }
        }

        function populateVehicleSelect() {
            const select = document.getElementById('vehicleSelect');
            select.innerHTML = '';
            data.vehicles.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v.id;
                opt.textContent = v.name;
                if(v.id === activeVehicleId) opt.selected = true;
                select.appendChild(opt);
            });
            document.getElementById('addEventBtn').disabled = data.vehicles.length === 0;
        }

        function switchVehicle(id) {
            activeVehicleId = id;
            const vehicle = data.vehicles.find(v => v.id === id);
            if (vehicle) {
                const imgContainer = document.getElementById('vehicleImageContainer');
                const img = document.getElementById('vehicleProfileImg');
                if (vehicle.image) {
                    img.src = vehicle.image;
                    imgContainer.classList.remove('hidden');
                } else {
                    imgContainer.classList.add('hidden');
                }
            }
            renderEverything();
        }

        function saveEvent(e) {
            e.preventDefault();
            const vehicle = data.vehicles.find(v => v.id === activeVehicleId);
            if (!vehicle) return;

            const newEvent = {
                id: 'e_' + Date.now(),
                datum: document.getElementById('eDate').value,
                typ: document.getElementById('eType').value,
                titel: document.getElementById('eTitle').value,
                notiz: document.getElementById('eNote').value
            };

            vehicle.events.push(newEvent);
            saveToStorage();
            closeModal('eventModal');
            document.getElementById('eventForm').reset();
        }

        function formatDate(dateString) {
            if(!dateString) return '';
            const d = new Date(dateString);
            return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }

        function getDaysDiff(futureDateStr) {
            const now = new Date(); now.setHours(0,0,0,0);
            const future = new Date(futureDateStr); future.setHours(0,0,0,0);
            return Math.ceil((future - now) / (1000 * 60 * 60 * 24));
        }

        function formatRemainingTime(days) {
            if (days < 0) return "🔥 Erledigt / Vorbei";
            if (days === 0) return "⚡ HEUTE FÄLLIG!";
            if (days < 30) return `Noch ${days} Tage`;
            const months = Math.floor(days / 30.43);
            return `Noch ca. ${months} Monat(e)`;
        }

        // RENDER PIPELINE: Generiert die Slalom-Ansicht
        function renderEverything() {
            const vehicle = data.vehicles.find(v => v.id === activeVehicleId);
            const slalomContainer = document.getElementById('slalomTimelineContainer');
            const countdownContainer = document.getElementById('countdownContainer');
            
            if (!vehicle) {
                slalomContainer.innerHTML = '<p class="text-slate-500 italic text-sm">Keine Maschinen im Fuhrpark. Drücke oben auf "Bike/KFZ einreiten".</p>';
                countdownContainer.innerHTML = '<p class="text-xs text-slate-500 italic">Werkstatt schläft...</p>';
                return;
            }

            document.getElementById('timelineVehicleName').textContent = vehicle.name;
            document.getElementById('timelineVehicleSub').textContent = `LEASE ROAD: ${formatDate(vehicle.leasingStart)} BIS ${formatDate(vehicle.leasingEnde)}`;
            
            const badge = document.getElementById('timelineVehicleBadge');
            badge.innerHTML = vehicle.image ? `<img src="${vehicle.image}" class="w-full h-full object-cover filter grayscale">` : `<i data-lucide="shield" class="w-8 h-8"></i>`;

            // Events sortieren
            let allEvents = [
                { datum: vehicle.leasingStart, typ: 'Start', titel: 'Leasing Start (Übernahme)', notiz: 'Asphalt brennt' },
                { datum: vehicle.leasingEnde, typ: 'Ende', titel: 'Leasing Ende (Endstation)', notiz: 'Schlüsselabgabe' }
            ];
            vehicle.events.forEach(e => allEvents.push(e));
            allEvents.sort((a, b) => new Date(a.datum) - new Date(b.datum));

            const activeFilter = document.getElementById('typeFilter').value;
            if (activeFilter !== 'all') {
                allEvents = allEvents.filter(e => e.typ === 'Start' || e.typ === 'Ende' || e.typ === activeFilter);
            }

            // KARTEN REINRENDERN (Slalom Anordnung über Grid-Spalten)
            slalomContainer.innerHTML = '';
            allEvents.forEach((event, index) => {
                const card = document.createElement('div');
                const borderColors = typeColors[event.typ] || 'border-slate-700';
                
                card.className = `p-5 rounded-2xl border-2 bg-slate-950 relative shadow-xl flex flex-col justify-between ${borderColors}`;
                card.innerHTML = `
                    <div class="absolute -top-3 left-4 bg-slate-900 px-3 py-0.5 border border-slate-700 rounded-full text-xs font-mono text-orange-500 font-bold">
                        ${formatDate(event.datum)}
                    </div>
                    <div class="mt-2">
                        <div class="flex items-center gap-2 mb-2">
                            <i data-lucide="${typeIcons[event.typ]}" class="w-4 h-4 text-orange-500"></i>
                            <h4 class="text-md font-black uppercase tracking-wider rock-font text-white">${event.titel}</h4>
                        </div>
                        ${event.notiz ? `<p class="text-xs text-slate-400 font-mono italic bg-slate-900 p-2 rounded-lg border border-slate-800/60">${event.notiz}</p>` : ''}
                    </div>
                    <div class="mt-4 flex justify-between items-center text-[10px] uppercase font-bold tracking-widest text-slate-500 border-t border-slate-800 pt-2">
                        <span>STATION #${index + 1}</span>
                        <span class="text-orange-600/80">${event.typ}</span>
                    </div>
                `;
                slalomContainer.appendChild(card);
            });

            // Countdowns befüllen
            countdownContainer.innerHTML = '';
            let countItems = [{ titel: 'Endstation (Leasing Ende)', tage: getDaysDiff(vehicle.leasingEnde) }];
            vehicle.events.forEach(e => {
                const diff = getDaysDiff(e.datum);
                if(diff >= 0) countItems.push({ titel: e.titel, tage: diff });
            });
            countItems.sort((a,b) => a.tage - b.tage);

            countItems.forEach(item => {
                const cDiv = document.createElement('div');
                cDiv.className = "p-3 rounded-xl border border-slate-800 bg-slate-950 text-xs flex justify-between items-center";
                cDiv.innerHTML = `
                    <div>
                        <span class="font-bold text-slate-200 block uppercase tracking-wide text-[11px]">${item.titel}</span>
                        <span class="text-orange-500 font-mono text-[11px] font-bold">${formatRemainingTime(item.tage)}</span>
                    </div>
                    <span class="w-2 h-2 rounded-full ${item.tage < 30 ? 'bg-red-500 animate-ping' : 'bg-orange-500'}"></span>
                `;
                countdownContainer.appendChild(cDiv);
            });

            lucide.createIcons();
        }

        // SLALOM / MEHRSEITEN PDF EXPORT (A4 Querformat)
        function exportSlalomPDF() {
            const { jsPDF } = window.jspdf;
            const element = document.getElementById('pdfRenderArea');

            // Optimierung für den Export: Kontraste schärfen
            html2canvas(element, {
                scale: 2,
                useCORS: true,
                backgroundColor: '#020617', // Tiefdunkler Hintergrund mitsenden
                logging: false
            }).then(canvas => {
                const imgData = canvas.toDataURL('image/png');
                const pdf = new jsPDF('l', 'mm', 'a4');
                
                const pdfWidth = 297;
                const pdfHeight = 210;
                
                // Berechnen wie viel Höhe das generierte Bild hat
                const imgWidth = pdfWidth;
                const imgHeight = (canvas.height * imgWidth) / canvas.width;
                
                let heightLeft = imgHeight;
                let position = 0;

                // Erste Seite hinzufügen
                pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
                heightLeft -= pdfHeight;

                // Falls der Slalom-Zeitstrahl länger als eine A4 Seite nach unten wandert -> neue Seiten dranhängen
                while (heightLeft > 0) {
                    position = heightLeft - imgHeight;
                    pdf.addPage();
                    pdf.addImage(imgData, 'PNG', 0, position, imgWidth, imgHeight);
                    heightLeft -= pdfHeight;
                }

                const vehicle = data.vehicles.find(v => v.id === activeVehicleId);
                const nameSnippet = vehicle ? vehicle.name.replace(/\s+/g, '_') : 'Garage';
                pdf.save(`GARAGE_LEASING_${nameSnippet.toUpperCase()}.pdf`);
            });
        }
    </script>
</body>
</html>
