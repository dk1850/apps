<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KFZ Timeline Manager</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- jsPDF & html2canvas für PDF Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* Custom Scrollbar für die Timeline */
        .custom-scroll::-webkit-scrollbar { height: 8px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <div class="max-w-7xl mx-auto p-4 md:p-6 space-y-6">
        
        <!-- HEADER -->
        <header class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-white p-4 rounded-xl shadow-sm border border-slate-100 no-print">
            <div>
                <h1 class="text-2xl font-bold text-slate-900 flex items-center gap-2">
                    <i data-lucide="car" class="text-blue-600"></i> KFZ Timeline Manager
                </h1>
                <p class="text-sm text-slate-500">Verwalte deine Leasing-Fahrzeuge, Termine und Historie.</p>
            </div>
            <div class="flex gap-2 w-full sm:w-auto">
                <button onclick="openModal('vehicleModal')" class="flex-1 sm:flex-none bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium text-sm flex items-center justify-center gap-2 transition">
                    <i data-lucide="plus-circle" class="w-4 h-4"></i> Auto anlegen
                </button>
                <button onclick="exportTimelinePDF()" class="flex-1 sm:flex-none bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg font-medium text-sm flex items-center justify-center gap-2 transition">
                    <i data-lucide="download" class="w-4 h-4"></i> PDF (Querformat)
                </button>
            </div>
        </header>

        <!-- FAHRZEUG AUSWAHL & COUNTDOWNS -->
        <main class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            
            <!-- Linke Spalte: Auswahl & Info -->
            <div class="space-y-6 no-print">
                <!-- Fahrzeug-Selektor -->
                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100">
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Aktives Fahrzeug</label>
                    <select id="vehicleSelect" onchange="switchVehicle(this.value)" class="w-full bg-slate-50 border border-slate-200 rounded-lg p-2.5 text-sm font-medium focus:ring-2 focus:ring-blue-500 focus:outline-none">
                        <!-- Wird via JS befüllt -->
                    </select>
                    
                    <!-- Profilbild Anzeige -->
                    <div id="vehicleImageContainer" class="mt-4 hidden">
                        <img id="vehicleProfileImg" src="" alt="Fahrzeugbild" class="w-full h-40 object-cover rounded-lg border border-slate-200 shadow-inner">
                    </div>
                </div>

                <!-- Countdowns -->
                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 space-y-3">
                    <h3 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1">Anstehende Termine</h3>
                    <div id="countdownContainer" class="space-y-2">
                        <!-- Wird via JS befüllt -->
                    </div>
                </div>

                <!-- Event hinzufügen Button -->
                <button onclick="openModal('eventModal')" id="addEventBtn" class="w-full bg-slate-900 hover:bg-slate-800 text-white p-3 rounded-xl font-medium text-sm flex items-center justify-center gap-2 transition shadow-sm disabled:opacity-50" disabled>
                    <i data-lucide="calendar-plus" class="w-4 h-4"></i> Event eintragen
                </button>
            </div>

            <!-- Rechte Spalte: Die Timeline Ansicht -->
            <div class="lg:col-span-3 space-y-6">
                <!-- Filter & Steuerung -->
                <div class="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex flex-wrap gap-4 items-center justify-between no-print">
                    <div class="flex items-center gap-2">
                        <i data-lucide="filter" class="w-4 h-4 text-slate-400"></i>
                        <span class="text-sm font-medium text-slate-600">Filter:</span>
                        <select id="typeFilter" onchange="renderEverything()" class="bg-slate-50 border border-slate-200 rounded-lg p-1.5 text-sm focus:outline-none">
                            <option value="all">Alle Event-Typen</option>
                            <option value="Wartung">Wartung / Service</option>
                            <option value="TÜV">TÜV</option>
                            <option value="Reparatur">Reparatur</option>
                            <option value="Sonstiges">Sonstiges</option>
                        </select>
                    </div>
                    <div class="text-xs text-slate-400 flex items-center gap-1">
                        <i data-lucide="move-horizontal" class="w-3 h-3"></i> Horizontal scrollbar
                    </div>
                </div>

                <!-- HORIZONTALE TIMELINE -->
                <div id="pdfRenderArea" class="bg-white p-6 rounded-xl shadow-sm border border-slate-100 overflow-hidden">
                    <div class="flex items-center gap-4 mb-6 border-b pb-4">
                        <div id="timelineVehicleBadge" class="w-12 h-12 rounded-full bg-slate-100 border overflow-hidden flex items-center justify-center text-slate-400 font-bold"></div>
                        <div>
                            <h2 id="timelineVehicleName" class="text-xl font-bold text-slate-900">Kein Fahrzeug ausgewählt</h2>
                            <p id="timelineVehicleSub" class="text-xs text-slate-500">Leasing-Übersicht</p>
                        </div>
                    </div>

                    <div class="overflow-x-auto custom-scroll pb-6 pt-4">
                        <div id="horizontalTimeline" class="relative flex items-start min-w-max px-8">
                            <div class="absolute top-[35px] left-0 right-0 h-1 bg-blue-500 rounded-full z-0"></div>
                            <div id="timelineNodes" class="flex gap-16 relative z-10">
                                <p class="text-slate-400 text-sm italic">Lege zuerst ein Fahrzeug an...</p>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </main>
    </div>

    <!-- MODAL: AUTO ANLEGEN -->
    <div id="vehicleModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden items-center justify-center z-50 p-4 no-print">
        <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-xl border border-slate-100 transform transition-all">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-slate-900">Neues Fahrzeug anlegen</h3>
                <button onclick="closeModal('vehicleModal')" class="text-slate-400 hover:text-slate-600"><i data-lucide="x"></i></button>
            </div>
            <form id="vehicleForm" class="space-y-4" onsubmit="saveVehicle(event)">
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Name des Fahrzeugs (z.B. "Kangoo rot")</label>
                    <input type="text" id="vName" required class="w-full border border-slate-200 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Leasing Start</label>
                        <input type="date" id="vStart" required class="w-full border border-slate-200 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Leasing Ende</label>
                        <input type="date" id="vEnde" required class="w-full border border-slate-200 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Fahrzeugbild (Optional)</label>
                    <input type="file" id="vImage" accept="image/*" class="w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-2.5 rounded-lg font-medium text-sm transition mt-2">Speichern</button>
            </form>
        </div>
    </div>

    <!-- MODAL: EVENT HINZUFÜGEN -->
    <div id="eventModal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm hidden items-center justify-center z-50 p-4 no-print">
        <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-xl border border-slate-100 transform transition-all">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-slate-900">Neues Event eintragen</h3>
                <button onclick="closeModal('eventModal')" class="text-slate-400 hover:text-slate-600"><i data-lucide="x"></i></button>
            </div>
            <form id="eventForm" class="space-y-4" onsubmit="saveEvent(event)">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Datum</label>
                        <input type="date" id="eDate" required class="w-full border border-slate-200 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-600 mb-1">Typ</label>
                        <select id="eType" class="w-full border border-slate-200 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
                            <option value="Wartung">Wartung / Service</option>
                            <option value="TÜV">TÜV</option>
                            <option value="Reparatur">Reparatur</option>
                            <option value="Sonstiges">Sonstiges</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Bezeichnung (z.B. "1. Wartung")</label>
                    <input type="text" id="eTitle" required class="w-full border border-slate-200 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-600 mb-1">Notiz / Zusatzinfo (Optional)</label>
                    <input type="text" id="eNote" class="w-full border border-slate-200 rounded-lg p-2.5 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none" placeholder="z.B. Werkstatt Name, Kosten...">
                </div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white p-2.5 rounded-lg font-medium text-sm transition mt-2">Hinzufügen</button>
            </form>
        </div>
    </div>

    <!-- LOGIK & APPLIKATIONSSCRIPT -->
    <script>
        let data = { vehicles: [] };
        let activeVehicleId = null;

        const typeIcons = {
            'Start': 'flag',
            'Ende': 'key',
            'Wartung': 'wrench',
            'TÜV': 'clipboard-check',
            'Reparatur': 'alert-triangle',
            'Sonstiges': 'file-text'
        };

        const typeColors = {
            'Start': 'bg-emerald-500 text-white ring-emerald-100',
            'Ende': 'bg-red-500 text-white ring-red-100',
            'Wartung': 'bg-blue-500 text-white ring-blue-100',
            'TÜV': 'bg-purple-500 text-white ring-purple-100',
            'Reparatur': 'bg-amber-500 text-white ring-amber-100',
            'Sonstiges': 'bg-slate-500 text-white ring-slate-100'
        };

        window.onload = function() {
            loadFromStorage();
            lucide.createIcons();
        };

        function loadFromStorage() {
            const localData = localStorage.getItem('kfz_timeline_data');
            if (localData) {
                data = JSON.parse(localData);
                populateVehicleSelect();
                if (data.vehicles.length > 0) {
                    switchVehicle(data.vehicles[0].id);
                }
            }
            renderEverything();
        }

        function saveToStorage() {
            localStorage.setItem('kfz_timeline_data', JSON.stringify(data));
            renderEverything();
        }

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); document.getElementById(id).classList.add('flex'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); document.getElementById(id).classList.remove('flex'); }

        function saveVehicle(e) {
            e.preventDefault();
            const name = document.getElementById('vName').value;
            const start = document.getElementById('vStart').value;
            const ende = document.getElementById('vEnde').value;
            const imgFile = document.getElementById('vImage').files[0];

            const newVehicle = {
                id: 'v_' + Date.now(),
                name: name,
                leasingStart: start,
                leasingEnde: ende,
                image: '',
                events: []
            };

            if (imgFile) {
                const reader = new FileReader();
                reader.onloadend = function() {
                    newVehicle.image = reader.result;
                    data.vehicles.push(newVehicle);
                    activeVehicleId = newVehicle.id;
                    saveToStorage();
                    populateVehicleSelect();
                    closeModal('vehicleModal');
                    document.getElementById('vehicleForm').reset();
                }
                reader.readAsDataURL(imgFile);
            } else {
                data.vehicles.push(newVehicle);
                activeVehicleId = newVehicle.id;
                saveToStorage();
                populateVehicleSelect();
                closeModal('vehicleModal');
                document.getElementById('vehicleForm').reset();
            }
        }

        function populateVehicleSelect() {
            const select = document.getElementById('vehicleSelect');
            select.innerHTML = '';
            data.vehicles.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v.id;
                opt.textContent = v.name;
                if(v.id === activeVehicleId) opt.selected = true;
                select.appendChild(opt);
            });
            document.getElementById('addEventBtn').disabled = data.vehicles.length === 0;
        }

        function switchVehicle(id) {
            activeVehicleId = id;
            const vehicle = data.vehicles.find(v => v.id === id);
            if (vehicle) {
                const imgContainer = document.getElementById('vehicleImageContainer');
                const img = document.getElementById('vehicleProfileImg');
                if (vehicle.image) {
                    img.src = vehicle.image;
                    imgContainer.classList.remove('hidden');
                } else {
                    imgContainer.classList.add('hidden');
                }
            }
            renderEverything();
        }

        function saveEvent(e) {
            e.preventDefault();
            const vehicle = data.vehicles.find(v => v.id === activeVehicleId);
            if (!vehicle) return;

            const newEvent = {
                id: 'e_' + Date.now(),
                datum: document.getElementById('eDate').value,
                typ: document.getElementById('eType').value,
                titel: document.getElementById('eTitle').value,
                notiz: document.getElementById('eNote').value
            };

            vehicle.events.push(newEvent);
            saveToStorage();
            closeModal('eventModal');
            document.getElementById('eventForm').reset();
        }

        function formatDate(dateString) {
            if(!dateString) return '';
            const d = new Date(dateString);
            return d.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
        }

        function getDaysDiff(futureDateStr) {
            const now = new Date();
            now.setHours(0,0,0,0);
            const future = new Date(futureDateStr);
            future.setHours(0,0,0,0);
            const diffTime = future - now;
            return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
        }

        function formatRemainingTime(days) {
            if (days < 0) return "Abgelaufen";
            if (days === 0) return "Heute fällig!";
            if (days < 30) return `Noch ${days} Tage`;
            
            const months = Math.floor(days / 30.43);
            const remainingDays = Math.floor(days % 30.43);
            
            if (months < 12) {
                return remainingDays > 0 ? `Noch ${months} Mon., ${remainingDays} Tage` : `Noch ${months} Monate`;
            } else {
                const years = Math.floor(months / 12);
                const remMonths = months % 12;
                return remMonths > 0 ? `Noch ${years} J., ${remMonths} Mon.` : `Noch ${years} Jahre`;
            }
        }

        function renderEverything() {
            const vehicle = data.vehicles.find(v => v.id === activeVehicleId);
            const nodeContainer = document.getElementById('timelineNodes');
            const countdownContainer = document.getElementById('countdownContainer');
            
            if (!vehicle) {
                nodeContainer.innerHTML = '<p class="text-slate-400 text-sm italic p-4">Lege zuerst oben rechts ein Fahrzeug an.</p>';
                countdownContainer.innerHTML = '<p class="text-xs text-slate-400 italic">Keine anstehenden Termine.</p>';
                document.getElementById('timelineVehicleName').textContent = "Kein Fahrzeug ausgewählt";
                return;
            }

            document.getElementById('timelineVehicleName').textContent = vehicle.name;
            document.getElementById('timelineVehicleSub').textContent = `Leasing: ${formatDate(vehicle.leasingStart)} bis ${formatDate(vehicle.leasingEnde)}`;
            
            const badge = document.getElementById('timelineVehicleBadge');
            if(vehicle.image) {
                badge.innerHTML = `<img src="${vehicle.image}" class="w-full h-full object-cover">`;
            } else {
                badge.innerHTML = vehicle.name.substring(0,2).toUpperCase();
            }

            let allEvents = [
                { datum: vehicle.leasingStart, typ: 'Start', titel: 'Leasing Start', notiz: 'Fahrzeugübernahme' },
                { datum: vehicle.leasingEnde, typ: 'Ende', titel: 'Leasing Ende', notiz: 'Fahrzeugrückgabe' }
            ];

            vehicle.events.forEach(e => allEvents.push(e));
            allEvents.sort((a, b) => new Date(a.datum) - new Date(b.datum));

            const activeFilter = document.getElementById('typeFilter').value;
            if (activeFilter !== 'all') {
                allEvents = allEvents.filter(e => e.typ === 'Start' || e.typ === 'Ende' || e.typ === activeFilter);
            }

            nodeContainer.innerHTML = '';
            allEvents.forEach(event => {
                const div = document.createElement('div');
                div.className = "flex flex-col items-center w-52 text-center relative";
                
                const iconName = typeIcons[event.typ] || 'circle';
                const colorClass = typeColors[event.typ] || 'bg-slate-400';

                div.innerHTML = `
                    <span class="text-xs font-bold text-slate-500 mb-2 block bg-slate-100 px-2 py-0.5 rounded-full">${formatDate(event.datum)}</span>
                    <div class="w-10 h-10 rounded-full flex items-center justify-center ring-4 ${colorClass} z-10 shadow-md">
                        <i data-lucide="${iconName}" class="w-5 h-5"></i>
                    </div>
                    <div class="mt-3 bg-white p-2.5 rounded-lg border border-slate-200 shadow-sm w-full">
                        <h4 class="text-sm font-bold text-slate-900 leading-tight">${event.titel}</h4>
                        ${event.notiz ? `<p class="text-xs text-slate-500 mt-1 italic">${event.notiz}</p>` : ''}
                        <span class="text-[10px] uppercase font-semibold tracking-wider text-slate-400 block mt-1.5">${event.typ}</span>
                    </div>
                `;
                nodeContainer.appendChild(div);
            });

            countdownContainer.innerHTML = '';
            let countdownItems = [];

            const daysToLeasing = getDaysDiff(vehicle.leasingEnde);
            if(daysToLeasing >= 0) {
                countdownItems.push({ titel: 'Leasing Ende', tage: daysToLeasing, typ: 'Ende' });
            }

            vehicle.events.forEach(e => {
                const diff = getDaysDiff(e.datum);
                if (diff >= 0) {
                    countdownItems.push({ titel: e.titel, tage: diff, typ: e.typ });
                }
            });

            countdownItems.sort((a,b) => a.tage - b.tage);

            if(countdownItems.length === 0) {
                countdownContainer.innerHTML = '<p class="text-xs text-slate-400 italic">Keine anstehenden Termine.</p>';
            } else {
                countdownItems.forEach(item => {
                    const cDiv = document.createElement('div');
                    cDiv.className = "p-2.5 rounded-lg border text-xs flex justify-between items-center bg-slate-50 border-slate-200";
                    cDiv.innerHTML = `
                        <div>
                            <span class="font-bold block text-slate-800">${item.titel}</span>
                            <span class="text-slate-500 text-[11px]">${formatRemainingTime(item.tage)}</span>
                        </div>
                        <span class="w-2 h-2 rounded-full ${item.tage < 30 ? 'bg-red-500 animate-pulse' : 'bg-blue-500'}"></span>
                    `;
                    countdownContainer.appendChild(cDiv);
                });
            }

            lucide.createIcons();
        }

        function exportTimelinePDF() {
            const { jsPDF } = window.jspdf;
            const element = document.getElementById('pdfRenderArea');
            const scrollBox = element.querySelector('.overflow-x-auto');
            scrollBox.style.overflowX = 'visible';

            html2canvas(element, {
                scale: 2,
                useCORS: true,
                logging: false
            }).then(canvas => {
                scrollBox.style.overflowX = 'auto';
                const imgData = canvas.toDataURL('image/png');
                const pdf = new jsPDF('l', 'mm', 'a4');
                const imgWidth = 297;
                const imgHeight = (canvas.height * imgWidth) / canvas.width;
                pdf.addImage(imgData, 'PNG', 0, 0, imgWidth, imgHeight);
                
                const vehicle = data.vehicles.find(v => v.id === activeVehicleId);
                const nameSnippet = vehicle ? vehicle.name.replace(/\s+/g, '_') : 'Timeline';
                pdf.save(`KFZ_Timeline_${nameSnippet}.pdf`);
            });
        }
    </script>
</body>
</html>
